<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cifras & 3 Setlists da Banda</title>
    <style>
        :root { 
            --bg: #121212; 
            --card: #1e1e1e; 
            --text: #e0e0e0; 
            --accent: #00adb5; 
            --chord: #ffde7d; 
            --indicacao: #00adb5; 
            --dinamica: #ff79c6; 
            --font-size-base: 16px; 
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; gap: 20px; }
        h1, h2, h3 { color: #fff; margin-top: 0; }
        
        .titulo-container { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; flex-wrap: wrap; }
        .titulo-container h1 { margin: 0; }
        .btn-toggle-configs { background: #555; padding: 5px 10px; font-size: 13px; }

        .sidebar { width: 320px; background: var(--card); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 20px; }
        .main-content { flex: 1; background: var(--card); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; }
        .search-input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #444; background: #2d2d2d; color: white; box-sizing: border-box; margin-bottom: 10px; }
        
        .song-item { padding: 10px; background: #2d2d2d; margin-bottom: 8px; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .song-item:hover { background: #3d3d3d; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; background: #2a2a2a; padding: 5px; border-radius: 4px; }
        .tab-btn { flex: 1; background: transparent; color: #aaa; border: none; padding: 6px; cursor: pointer; font-size: 12px; }
        .tab-btn.active { background: var(--accent); color: white; border-radius: 4px; font-weight: bold; }
        
        button { background: var(--accent); border: none; color: white; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        .select-setlist-add { background: #333; color: white; border: 1px solid #555; padding: 4px; border-radius: 4px; font-size: 12px; }
        .btn-danger { background: #ff414d; }
        .btn-nav-song { background: #3282b8; } 
        .btn-share { background: #28a745; width: 100%; padding: 12px; font-size: 15px; margin-top: 10px; }
        
        .cifra-box { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 6px; 
            border: 1px solid #333; 
            margin-top: 10px; 
            box-sizing: border-box;
        }
        
        .cifra-box.duas-colunas { 
            display: flex;
            flex-direction: column;
            flex-wrap: wrap; 
            align-content: flex-start;
            column-gap: 40px;
            max-height: calc(100vh - 180px); 
            overflow-x: auto; 
            overflow-y: hidden; 
        }

        .mobile-fullscreen .cifra-box.duas-colunas {
            max-height: calc(100vh - 120px);
        }
        
        .cifra-linha { 
            display: flex; 
            flex-wrap: wrap; 
            align-items: flex-end; 
            min-height: 1.2em; 
            break-inside: avoid; 
            margin-bottom: 0px; 
        }
        .cifra-linha-vazia { height: 0.4em; break-inside: avoid; }
        
        .cifra-linha-indicacao { 
            color: var(--indicacao); 
            font-weight: bold; 
            font-size: calc(var(--font-size-base) + 1px); 
            margin-top: 2px;     
            margin-bottom: 1px;  
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            break-inside: avoid;
        }

        .cifra-linha-dinamica { 
            color: var(--dinamica); 
            font-style: italic; 
            font-weight: normal;
            font-size: calc(var(--font-size-base) - 1px); 
            margin-top: 4px;     
            margin-bottom: 4px;  
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            break-inside: avoid;
            display: block;
            width: 100%;
        }
        
        .cifra-bloco { display: inline-flex; flex-direction: column; align-items: flex-start; }
        .cifra-bloco .acorde { color: var(--chord); font-weight: bold; font-family: monospace; font-size: calc(var(--font-size-base) - 2px); line-height: 1.0; white-space: pre; }
        
        .cifra-bloco .silaba { 
            font-family: monospace; 
            font-size: var(--font-size-base); 
            line-height: 1.2; 
            white-space: pre; 
        }
        .cifra-bloco .silaba:empty { display: none; }
        
        .controls { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .list-container { max-height: 250px; overflow-y: auto; padding-right: 5px; }

        .main-content.mobile-fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 99999 !important;
            background: #121212 !important;
            box-sizing: border-box !important;
            overflow-y: auto !important;
            border-radius: 0 !important;
            padding: 20px 20px !important;
        }

        #btn-sair-fullscreen { display: none; }
        .mobile-fullscreen #btn-sair-fullscreen { display: inline-block; background: #ff414d; }
    </style>
</head>
<body>

    <div class="sidebar" id="barra-lateral">
        <div>
            <h2>1. Repositório</h2>
            <input type="text" id="search-bar" class="search-input" placeholder="Digita para pesquisar música..." oninput="filtrarMusicas()">
            <div id="lista-disponiveis" class="list-container">Digita algo para pesquisar...</div>
        </div>

        <div style="border-top: 1px solid #444; padding-top: 15px;">
            <h2>2. Setlists</h2>
            <div class="tabs">
                <button class="tab-btn active" id="tab-1" onclick="mudarTabSetlist(1)">Sexta</button>
                <button class="tab-btn" id="tab-2" onclick="mudarTabSetlist(2)">Domingo</button>
                <button class="tab-btn" id="tab-3" onclick="mudarTabSetlist(3)">Eventos</button>
            </div>
            <div id="lista-setlist" class="list-container"></div>
            <button class="btn-share" onclick="generarLinkPartilha()">🔗 Partilhar esta Setlist</button>
        </div>
    </div>
    <div class="main-content" id="main-area">
        <div class="titulo-container">
            <h1 id="musica-titulo">Seleciona uma música</h1>
            <button id="btn-toggle-config" class="btn-toggle-configs" onclick="toggleConfiguracoes()">⚙️ Configs</button>
        </div>
        
        <div class="controls" id="controlos-transpose">
            <button class="btn-nav-song" onclick="navegarMusica(-1)">❮ Anterior</button>
            <button class="btn-nav-song" onclick="navegarMusica(1)">Próxima ❯</button>
            <span>Tom: <strong id="tom-atual">C</strong></span>
            <button onclick="alterarTom(-1)">Sinal -</button>
            <button onclick="alterarTom(1)">Sinal +</button>
            <button onclick="toggleColunas()">Alternar Colunas</button>
            <button onclick="toggleFullscreen()">Ecrã Total</button>
            <button id="btn-sair-fullscreen" onclick="toggleFullscreen()">Sair Ecrã Total</button>
        </div>

        <div id="cifra-renderizada" class="cifra-box duas-colunas"></div>
    </div>

    <script>
        function renderizarCifra(textoCorpo) {
            const container = document.getElementById('cifra-renderizada');
            container.innerHTML = ''; 

            if (!textoCorpo) return;

            const linhas = textoCorpo.split('\n');

            linhas.forEach(linha => {
                const linhaTrim = linha.trim();

                if (linhaTrim === '') {
                    const divVazia = document.createElement('div');
                    divVazia.className = 'cifra-linha-vazia';
                    container.appendChild(divVazia);
                    return;
                }

                if (linhaTrim.startsWith('#')) {
                    const divDinamica = document.createElement('div');
                    divDinamica.className = 'cifra-linha-dinamica';
                    divDinamica.textContent = linhaTrim.substring(1).trim(); 
                    container.appendChild(divDinamica);
                    return;
                }

                if (linhaTrim.startsWith('*')) {
                    const divIndicacao = document.createElement('div');
                    divIndicacao.className = 'cifra-linha-indicacao';
                    divIndicacao.textContent = linhaTrim.substring(1).trim(); 
                    container.appendChild(divIndicacao);
                    return;
                }

                const divLinha = document.createElement('div');
                divLinha.className = 'cifra-linha';

                let regex = /\[([^\]]+)\]([^\[]*)/g;
                let match;

                if (!linha.includes('[')) {
                    const blocoUnico = document.createElement('div');
                    blocoUnico.className = 'cifra-bloco';
                    const spanSilaba = document.createElement('span');
                    spanSilaba.className = 'silaba';
                    spanSilaba.textContent = inlineFix(linha);
                    blocoUnico.appendChild(spanSilaba);
                    divLinha.appendChild(blocoUnico);
                } else {
                    while ((match = regex.exec(linha)) !== null) {
                        const divBloco = document.createElement('div');
                        divBloco.className = 'cifra-bloco';

                        const spanAcorde = document.createElement('span');
                        spanAcorde.className = 'acorde';
                        spanAcorde.textContent = match[1];

                        const spanSilaba = document.createElement('span');
                        spanSilaba.className = 'silaba';
                        spanSilaba.textContent = match[2];

                        divBloco.appendChild(spanAcorde);
                        divBloco.appendChild(spanSilaba);
                        divLinha.appendChild(divBloco);
                    }
                }
                container.appendChild(divLinha);
            });
        }

        function inlineFix(str) { return str || ''; }
        function filtrarMusicas() {}
        function mudarTabSetlist(num) {}
        function generarLinkPartilha() {}
        function toggleConfiguracoes() {}
        function navegarMusica(dir) {}
        function alterarTom(semitons) {}
        function toggleColunas() {
            document.getElementById('cifra-renderizada').classList.toggle('duas-colunas');
        }
        function toggleFullscreen() {
            document.getElementById('main-area').classList.toggle('mobile-fullscreen');
        }
    </script>
</body>
</html>
